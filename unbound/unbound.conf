#!/bin/bash

################################################################################
# IG Edge One - Unbound DNS Configuration
# DNSSEC enabled, Caching optimized, Prefetch enabled
################################################################################

# Set up verbosity
verbosity: 0

# Listen on all interfaces (IPv4 and IPv6)
server:
    # Network interfaces
    interface: 0.0.0.0
    interface: ::
    
    # Listen port
    port: 53
    
    # IPv4 and IPv6 support
    do-ip4: yes
    do-ip6: yes
    
    # UDP and TCP support
    do-udp: yes
    do-tcp: yes
    
    # Optimization
    num-threads: 4
    msg-cache-slabs: 8
    rrset-cache-slabs: 8
    infra-cache-slabs: 8
    key-cache-slabs: 8
    
    # Message cache size (64MB)
    msg-cache-size: 64m
    
    # RRset cache size (128MB)
    rrset-cache-size: 128m
    
    # TCP timeout
    tcp-idle-timeout: 30000
    
    # Prefetch
    prefetch: yes
    prefetch-key: yes
    
    # DNSSEC
    auto-trust-anchor-file: "/opt/unbound/etc/unbound/root.key"
    trust-anchor-file: "/opt/unbound/etc/unbound/root.key"
    val-log-level: 2
    
    # Access control - only allow queries from specific networks
    access-control: 127.0.0.1/8 allow
    access-control: 192.168.0.0/16 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: ::1/128 allow
    access-control: ::/0 deny
    
    # Recursive queries
    recursion: yes
    recursive-protection: yes
    
    # Qname minimization
    qname-minimization: yes
    
    # Rate limiting
    rate-limit: 0
    
    # Logging
    use-syslog: yes
    log-time-ascii: yes
    log-queries: no
    log-replies: no
    
    # Unwanted record types
    unwanted-reply-threshold: 10000
    
    # Performance tuning
    so-rcvbuf: 8m
    so-sndbuf: 8m

# Remote control interface
remote-control:
    control-enable: yes
    control-interface: 127.0.0.1
    control-port: 8953
    server-key-file: "/opt/unbound/etc/unbound/server.key"
    server-cert-file: "/opt/unbound/etc/unbound/server.pem"
    control-key-file: "/opt/unbound/etc/unbound/control.key"
    control-cert-file: "/opt/unbound/etc/unbound/control.pem"